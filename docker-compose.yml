services:
  postgres:
    image: postgres:18
    container_name: upsurge-postgres
    environment:
      POSTGRES_DB: upsurge
      POSTGRES_USER: ${POSTGRES_USER:-upsurge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upsurge}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres18_data:
