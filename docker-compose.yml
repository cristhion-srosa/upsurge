services:
  app:
    build: .
    container_name: upsurge-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/upsurge
      PORT: ${PORT}
    ports:
      - '${PORT}:3000'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: upsurge-postgres
    environment:
      POSTGRES_DB: upsurge
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres18_data:
